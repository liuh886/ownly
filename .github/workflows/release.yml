name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build Obsidian plugin
        run: npm run package:obsidian

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/obsidian/ownly/main.js
            dist/obsidian/ownly/styles.css

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/obsidian/ownly/main.js
            dist/obsidian/ownly/styles.css
            dist/obsidian/ownly/manifest.json
          draft: false
          generate_release_notes: true
