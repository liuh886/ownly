name: Release Obsidian Plugin

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build Obsidian plugin
        run: npm run package:obsidian

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/obsidian/wyqd/main.js
            dist/obsidian/wyqd/styles.css
            dist/obsidian/wyqd/manifest.json
            dist/obsidian/wyqd/versions.json
          draft: false
          generate_release_notes: true
